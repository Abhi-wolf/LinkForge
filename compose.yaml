services:
  mongo:
    image: mongo:latest
    restart: unless-stopped
    ports:
      - 27017:27017
    networks:
      - backend
    volumes:
      - mongodb_url_shortener_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - 6379:6379
    networks:
      - backend
    volumes:
      - redis_url_shortener_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    ports:
      - 4000:4000
      - 4200:4200
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    environment:
      - PORT=4000
      - DB_URL=mongodb://mongo:27017/url_shortener
      - REDIS_URL=redis://redis:6379
      - REDIS_COUNTER_KEY=url_shortener_counter
      - NODE_ENV=production
      - BASE_URL=http://localhost:4000
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_REFRESH_SECRET=your-super-secret-refresh-key-change-in-production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    ports:
      - 3000:3000
    depends_on:
      server:
        condition: service_healthy
    networks:
      - backend
    environment:
      - VITE_TRPC_URL=http://server:4000/trpc
      - VITE_BASE_URL=http://server:4000


networks:
  backend:
    driver: bridge

volumes:
  mongodb_url_shortener_data:
  redis_url_shortener_data:
