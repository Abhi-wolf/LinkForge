global:
  scrape_interval: 30s

scrape_configs:
  - job_name: 'linkforge'
    static_configs:
      - targets: ['server:4000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'mongo'
    static_configs:
      - targets: ['mongo-exporter:9216']